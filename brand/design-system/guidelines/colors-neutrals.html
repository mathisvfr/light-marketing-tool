<!-- @dsCard group="Colors" viewport="700x140" name="Neutral ramp" subtitle="Cool grey 50→900 (logo grey = 500)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--color-bg);font-family:var(--font-body);}
  .row{display:flex;gap:6px;}
  .sw{flex:1;}
  .chip{height:62px;border-radius:var(--radius-sm);border:1px solid rgba(0,0,0,0.06);}
  .num{font-family:var(--font-display);font-weight:800;font-size:12px;text-align:center;margin-top:6px;color:var(--color-text);}
  .tag{font-family:var(--font-mono);font-size:9.5px;text-align:center;color:var(--color-text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--grey-50)"></div><div class="num">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--grey-100)"></div><div class="num">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--grey-200)"></div><div class="num">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--grey-300)"></div><div class="num">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--grey-400)"></div><div class="num">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--grey-500)"></div><div class="num">500</div><div class="tag">logo</div></div>
    <div class="sw"><div class="chip" style="background:var(--grey-600)"></div><div class="num">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--grey-700)"></div><div class="num">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--grey-800)"></div><div class="num">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--grey-900)"></div><div class="num">900</div></div>
  </div>
</body></html>
