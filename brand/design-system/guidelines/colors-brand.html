<!-- @dsCard group="Colors" viewport="700x190" name="Brand colors" subtitle="Red #be1e2d + logo grey #787c7e" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--color-bg);font-family:var(--font-body);}
  .row{display:flex;gap:16px;}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--color-border);}
  .chip{height:96px;}
  .meta{padding:10px 12px;}
  .name{font-family:var(--font-display);font-weight:800;font-size:14px;color:var(--color-text);}
  .hex{font-family:var(--font-mono);font-size:12.5px;color:var(--color-text-muted);margin-top:2px;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--light-red)"></div><div class="meta"><div class="name">Brand red</div><div class="hex">--light-red · #be1e2d</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--grey-500)"></div><div class="meta"><div class="name">Brand grey</div><div class="hex">--grey-500 · #787c7e</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--grey-900)"></div><div class="meta"><div class="name">Ink</div><div class="hex">--grey-900 · #1f2123</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--white);border-bottom:1px solid var(--color-border)"></div><div class="meta"><div class="name">White</div><div class="hex">--white · #ffffff</div></div></div>
  </div>
</body></html>
