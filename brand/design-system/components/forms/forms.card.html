<!-- @dsCard group="Components" viewport="700x230" name="Forms — Input & Select" subtitle="Labelled fields with red focus ring" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:24px;background:var(--color-bg);font-family:var(--font-body);}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    function DS(){ for (const k in window){ const v=window[k]; if(v&&v.Input&&v.Select) return v; } return {}; }
    const { Input, Select } = DS();
    const e = React.createElement;
    ReactDOM.createRoot(document.getElementById('root')).render(
      e('div',{className:'grid'},
        e(Input,{label:'Naam',placeholder:'Voor- en achternaam',required:true}),
        e(Input,{label:'E-mail',type:'email',icon:'mail',hint:'Reactie binnen 1 werkdag.'}),
        e(Select,{label:'Vakgebied',options:['Productie','Logistiek','Schoonmaak']}),
      )
    );
    setTimeout(()=>window.lucide&&lucide.createIcons(),60);
  </script>
</body></html>
