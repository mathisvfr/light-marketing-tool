<!-- @dsCard group="Brand" viewport="700x200" name="Notched-corner motif" subtitle="The logo banner's cut corner, used on CTAs & badges" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:var(--color-bg);font-family:var(--font-body);display:flex;gap:20px;align-items:center;}
  .cta{background:var(--light-red);color:#fff;padding:22px 28px;clip-path:var(--clip-notch);max-width:330px;}
  .cta .k{font-family:var(--font-display);font-weight:900;font-size:22px;line-height:1.1;}
  .cta .s{font-size:13px;opacity:.92;margin-top:6px;}
  .badge{display:inline-flex;align-items:center;gap:8px;background:var(--grey-800);color:#fff;font-family:var(--font-display);font-weight:800;font-size:13px;letter-spacing:.04em;padding:10px 16px;clip-path:var(--clip-notch);}
</style></head>
<body>
  <div class="cta"><div class="k">De productie moet draaien.</div><div class="s">Wij regelen het personeel — punt.</div></div>
  <div style="display:flex;flex-direction:column;gap:14px;">
    <span class="badge">SNA-GECERTIFICEERD</span>
    <span class="badge" style="background:var(--light-red)">VACATURE OPEN</span>
  </div>
</body></html>
