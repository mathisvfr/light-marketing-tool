<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows" subtitle="Soft, low — xs/sm/md + red CTA glow" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:28px;background:var(--color-bg);font-family:var(--font-body);display:flex;gap:26px;}
  .item{text-align:center;flex:1;}
  .box{height:74px;background:#fff;border:1px solid var(--color-border);border-radius:var(--radius-md);}
  .nm{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);margin-top:14px;}
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="nm">--shadow-xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="nm">--shadow-sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="nm">--shadow-md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-red);border-color:var(--light-red-300)"></div><div class="nm">--shadow-red</div></div>
</body></html>
