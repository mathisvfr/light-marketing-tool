services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: https://${DOMAIN}
    volumes:
      - ./backend/prompts:/app/prompts:ro
      - ./brand:/app/brand:ro
      - ./backend/uploads:/app/uploads
    expose:
      - "3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - backend
      - frontend
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
