<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--color-bg);font-family:var(--font-body);}
  .row{display:flex;gap:8px;}
  .sw{flex:1;}
  .chip{height:60px;border-radius:var(--radius-sm);border:1px solid rgba(0,0,0,0.06);}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--color-text-muted);margin-top:6px;text-align:center;}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--color-text);text-align:center;font-weight:700;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--light-red-50)"></div><div class="hex">50</div><div class="lbl">#fcedef</div></div>
    <div class="sw"><div class="chip" style="background:var(--light-red-100)"></div><div class="hex">100</div><div class="lbl">#f7d6da</div></div>
    <div class="sw"><div class="chip" style="background:var(--light-red-300)"></div><div class="hex">300</div><div class="lbl">#e07b85</div></div>
    <div class="sw"><div class="chip" style="background:var(--light-red)"></div><div class="hex" style="color:#fff;margin-top:-26px;position:relative">500</div><div class="lbl">#be1e2d</div></div>
    <div class="sw"><div class="chip" style="background:var(--light-red-600)"></div><div class="hex" style="color:#fff;margin-top:-26px;position:relative">600</div><div class="lbl">#a81927</div></div>
    <div class="sw"><div class="chip" style="background:var(--light-red-700)"></div><div class="hex" style="color:#fff;margin-top:-26px;position:relative">700</div><div class="lbl">#8d1420</div></div>
  </div>
</body></html>
